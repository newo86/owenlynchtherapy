name: CI

# Typecheck, lint and unit tests on every push and PR. The tests include the
# guard that stops "ghost" sessions from emailing clients (calendarSync.test.ts)
# so that protection can never be silently broken by a future change.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # (lint is intentionally not gated here yet — the repo has pre-existing
      #  react-hooks lint errors unrelated to this suite; add `npm run lint`
      #  once those are cleared so CI stays green and trustworthy.)
