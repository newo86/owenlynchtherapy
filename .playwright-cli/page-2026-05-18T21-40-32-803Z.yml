            - text: accredited integrative psychotherapist based in Dublin. I work with adults in person and online across Ireland and the UK.
          - paragraph [ref=e41]: I adapt therapy to you. We might focus on what's happening now, or take time to understand where things come from. My work draws on approaches including ACT, CBT, ERP, psychodynamic, and person-centred therapy.
          - paragraph [ref=e42]: I'll be engaged in the process with you. I work with curiosity and honesty — that means I'll support you fully, and I'll also challenge you when it's needed.
