            - heading "Integrative" [level=3] [ref=e57]
            - paragraph [ref=e58]: I don't follow a single fixed model. I draw on ACT, CBT, ERP, psychodynamic, and person-centred approaches — adapting how I work to fit you, not the other way around.
          - generic [ref=e59]:
            - heading "Honest & Direct" [level=3] [ref=e61]
            - paragraph [ref=e62]: I'll engage genuinely with what you bring — offering perspective, naming what I notice, and challenging you when that's useful. Always with care, never with judgment.
          - generic [ref=e63]:
            - heading "Specialist Focus" [level=3] [ref=e65]
            - paragraph [ref=e66]: I have particular experience with OCD, anxiety, ADHD, autism, depression, trauma, relationships, and LGBTQIA+ mental health including chemsex support.
